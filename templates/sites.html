<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sites List</title>
</head>
<body>
    <h1>Stored Links</h1>
    {% if links %}
        <table border="1" cellpadding="5" cellspacing="0">
            <thead>
                <tr>
                    <th>URL</th>
                </tr>
            </thead>
            <tbody>
                {% for link in links %}
                <tr>
                    <td><a href="{{ link.url }}" target="_blank">{{ link.url }}</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p>No links stored yet.</p>
    {% endif %}
    <p><a href="{% url 'home' %}">Home</a></p>
</body>
</html>
